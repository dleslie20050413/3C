    <script>
      window.onload = function()
      {
        var ihtml="<table>"
        ihtml += "<tr><th colspan='9'>Legend for Depth Display Map of Habitable Zone</th></tr>"
        ihtml += "<tr>"
        ihtml+="<th>sample</th><th style='text-align:right;'>magnitude</th><th style='text-align:left;'>color</th>"
        ihtml+="<th>sample</th><th style='text-align:right;'>magnitude</th><th style='text-align:left;'>color</th>"
        ihtml+="<th>sample</th><th style='text-align:right;'>magnitude</th><th style='text-align:left;'>color</th>"
        ihtml += "</tr>"
        var pc=0
        var alti=""
        for ( p in HZM.altitude )
        {
          //console.log(p + ", " + HZM.altitude[p]["bgcc"] + ", " + HZM.altitude[p]["desc"])
          //console.log("<p style='color:'" +HZM.altitude[p]["bgcc"] +"'>" + p + ", " + ", " + HZM.altitude[p]["desc"] +"</p>")
        var l = "" 
        if (pc % 3 == 0 ) {console.log("0"); l += "<tr>" } 
          if (p.charAt(0)=="b") { alti="-" } else { alti="+" }
          
          l += "<td style='border-style:double; background-color:"+HZM.altitude[p]["bgcc"] +"'></td>" 
          l += "<td>" + alti + p.substr(1) + "</td>"
          l += "<td style='text-align:left;'> " + HZM.altitude[p]["desc"] + "</td>"
          if (pc % 3 == 2 ) { console.log("2"); l += "</tr>"}
          console.log(l) 
          ihtml += l
          //ihtml += "</tr>"
          
          pc++
        }
        ihtml += "</table>"
        var hh1 = document.getElementById("hh1")
        hh1.innerHTML=ihtml
        
        //"<table><tr><th>magnitude</th><th>depth/height</th><th>color</th><th>sample</th></tr></table>" //
      }
    </script>
    <div id="hh1" style="color:blue;">Here
    </div>
